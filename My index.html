<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Real Tools App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            padding: 20px;
            color: #facc15;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
        }

        .box {
            background: white;
            color: black;
            padding: 15px;
            border-radius: 12px;
        }

        button {
            padding: 8px;
            margin-top: 8px;
            width: 100%;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
        }

        button:hover {
            background-color: #34d399;
        }

        .payment-button {
            background-color: #2563eb;
        }

        .payment-button:hover {
            background-color: #1e40af;
        }

        .pdf-button {
            background-color: #ff8c00;
        }

        .pdf-button:hover {
            background-color: #e76f00;
        }
    </style>
</head>

<body>

    <h1>🔥 REAL TOOLS APP</h1>

    <div class="container">
        <!-- Tool 1 -->
        <div class="box">
            📝 Text Tool<br>
            <textarea id="text"></textarea>
            <button onclick="upper()">UPPER</button>
            <button onclick="lower()">lower</button>
        </div>

        <!-- Tool 2 -->
        <div class="box">
            🔢 Word Counter<br>
            <textarea id="countText"></textarea>
            <button onclick="count()">Count</button>
            <p id="result"></p>
        </div>

        <!-- Tool 3 -->
        <div class="box">
            🔍 Search Google<br>
            <input id="search">
            <button onclick="goSearch()">Search</button>
        </div>

        <!-- Tool 4 -->
        <div class="box">
            📥 Download Text<br>
            <textarea id="dl"></textarea>
            <button onclick="download()">Download</button>
        </div>

        <!-- Tool 5 -->
        <div class="box">
            🖼️ Image Preview<br>
            <input type="file" onchange="preview(event)">
            <img id="img" width="100%">
        </div>

        <!-- Tool 6 -->
        <div class="box">
            🤖 AI Simple<br>
            <input id="ai">
            <button onclick="ai()">Ask</button>
            <p id="aiRes"></p>
        </div>

        <!-- Payment Tool -->
        <div class="box">
            💳 Payment Tool<br>
            <button class="payment-button" onclick="makePayment()">Make Payment</button>
        </div>

        <!-- PDF Tool -->
        <div class="box">
            📄 Generate PDF<br>
            <button class="pdf-button" onclick="generatePDF()">Generate PDF</button>
        </div>

        <!-- Extra Boxes (7-10) -->
        <div class="box">Box 7</div>
        <div class="box">Box 8</div>
        <div class="box">Box 9</div>
        <div class="box">Box 10</div>
    </div>

    <script>
        function upper() {
            document.getElementById("text").value =
                document.getElementById("text").value.toUpperCase();
        }

        function lower() {
            document.getElementById("text").value =
                document.getElementById("text").value.toLowerCase();
        }

        function count() {
            let t = document.getElementById("countText").value;
            document.getElementById("result").innerText =
                "Words: " + t.split(" ").length;
        }

        function goSearch() {
            let q = document.getElementById("search").value;
            window.open("https://www.google.com/search?q=" + q);
        }

        function download() {
            let text = document.getElementById("dl").value;
            let a = document.createElement("a");
            a.href = "data:text/plain," + text;
            a.download = "file.txt";
            a.click();
        }

        function preview(e) {
            document.getElementById("img").src =
                URL.createObjectURL(e.target.files[0]);
        }

        function ai() {
            let x = document.getElementById("ai").value;
            document.getElementById("aiRes").innerText =
                "AI reply: " + x;
        }

        function makePayment() {
            // Placeholder for payment logic
            alert("Payment Process Initiated");
        }

        function generatePDF() {
            // Placeholder for PDF generation logic
            alert("PDF Generation Triggered");
        }
    </script>

</body>
</html>
