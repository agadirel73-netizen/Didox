<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Real Tools App</title>
  <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-auth.js"></script>
  
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
      color: #facc15;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 15px;
    }

    .box {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 12px;
    }

    button {
      padding: 8px;
      margin-top: 8px;
      width: 100%;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
    }
  </style>

</head>

<body>

  <h1>🔥 REAL TOOLS APP</h1>

  <!-- Firebase Authentication -->
  <div class="box" id="loginBox">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Enter email">
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
  </div>

  <!-- Your 10 Tools -->

  <div class="container">

    <!-- Text Tool -->
    <div class="box">
      📝 Text Tool<br>
      <textarea id="text"></textarea>
      <button onclick="upper()">UPPER</button>
      <button onclick="lower()">lower</button>
    </div>

    <!-- Word Counter -->
    <div class="box">
      🔢 Word Counter<br>
      <textarea id="countText"></textarea>
      <button onclick="count()">Count</button>
      <p id="result"></p>
    </div>

    <!-- Google Search -->
    <div class="box">
      🔍 Search Google<br>
      <input id="search">
      <button onclick="goSearch()">Search</button>
    </div>

    <!-- Download Text -->
    <div class="box">
      📥 Download Text<br>
      <textarea id="dl"></textarea>
      <button onclick="download()">Download</button>
    </div>

    <!-- Image Preview -->
    <div class="box">
      🖼️ Image Preview<br>
      <input type="file" onchange="preview(event)">
      <img id="img" width="100%">
    </div>

    <!-- AI Simple -->
    <div class="box">
      🤖 AI Simple<br>
      <input id="ai">
      <button onclick="ai()">Ask</button>
      <p id="aiRes"></p>
    </div>

  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "your-api-key",
      authDomain: "your-auth-domain",
      projectId: "your-project-id",
      storageBucket: "your-storage-bucket",
      messagingSenderId: "your-sender-id",
      appId: "your-app-id"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Login Function
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          const user = userCredential.user;
          alert('Logged in as ' + user.email);
        })
        .catch(error => {
          alert(error.message);
        });
    }

    // Signup Function
    function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(userCredential => {
          const user = userCredential.user;
          alert('Signed up as ' + user.email);
        })
        .catch(error => {
          alert(error.message);
        });
    }

    // Text Tool Functions
    function upper() {
      document.getElementById("text").value = document.getElementById("text").value.toUpperCase();
    }

    function lower() {
      document.getElementById("text").value = document.getElementById("text").value.toLowerCase();
    }

    function count() {
      let t = document.getElementById("countText").value;
      document.getElementById("result").innerText = "Words: " + t.split(" ").length;
    }

    function goSearch() {
      let q = document.getElementById("search").value;
      window.open("https://www.google.com/search?q=" + q);
    }

    function download() {
      let text = document.getElementById("dl").value;
      let a = document.createElement("a");
      a.href = "data:text/plain," + text;
      a.download = "file.txt";
      a.click();
    }

    function preview(e) {
      document.getElementById("img").src = URL.createObjectURL(e.target.files[0]);
    }

    function ai() {
      let x = document.getElementById("ai").value;
      document.getElementById("aiRes").innerText = "AI reply: " + x;
    }
  </script>

</body>
</html>
