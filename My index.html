<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PRO ALL-IN-ONE APP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0ea5e9,#1e3a8a);
  color:white;
  text-align:center;
}

header{
  padding:15px;
  font-size:24px;
  font-weight:bold;
}

#login{
  padding:20px;
}

input, textarea{
  width:80%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

button{
  width:80%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.container{
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.box{
  background:white;
  color:black;
  padding:10px;
  border-radius:12px;
}
</style>

</head>

<body>

<header>⚡ PRO ALL-IN-ONE APP</header>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Enter App</button>
</div>

<!-- APP -->
<div id="app" class="container">

<div class="box">📝 Text Tool<br>
<textarea id="text"></textarea>
<button onclick="text.value=text.value.toUpperCase()">UPPER</button>
</div>

<div class="box">🔢 Counter<br>
<textarea id="count"></textarea>
<button onclick="res.innerText='Words: '+count.value.split(' ').length">Count</button>
<p id="res"></p>
</div>

<div class="box">🔍 Search<br>
<input id="s">
<button onclick="window.open('https://google.com/search?q='+s.value)">Search</button>
</div>

<div class="box">📥 Download<br>
<textarea id="dl"></textarea>
<button onclick="download()">Download</button>
</div>

<div class="box">🖼️ Image<br>
<input type="file" onchange="img.src=URL.createObjectURL(event.target.files[0])">
<img id="img" width="100%">
</div>

<div class="box">📄 PDF Viewer<br>
<input type="file" id="pdfFile" accept="application/pdf">
<button onclick="openPDF()">Open PDF</button>
</div>

<div class="box">Tool 7</div>
<div class="box">Tool 8</div>
<div class="box">Tool 9</div>
<div class="box">Tool 10</div>

</div>

<script>

/* LOGIN */
function login(){
if(user.value && pass.value){
login.style.display="none";
app.style.display="grid";
}else{
alert("Enter username & password");
}
}

/* DOWNLOAD */
function download(){
let a=document.createElement("a");
a.href="data:text/plain,"+dl.value;
a.download="file.txt";
a.click();
}

/* PDF */
function openPDF(){
let file=document.getElementById("pdfFile").files[0];
if(file){
window.open(URL.createObjectURL(file));
}else{
alert("Select PDF file first");
}
}

</script>

</body>
</html>
