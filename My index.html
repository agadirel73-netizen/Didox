
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App with Icons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .box {
            background-color: #fff;
            border: 2px solid #ddd;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .box i {
            font-size: 40px;
            margin-bottom: 10px;
            color: #007BFF;
        }
        button {
            background-color: #007BFF;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #app {
            display: none;
            margin-top: 20px;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> <!-- jsPDF -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Font Awesome -->
</head>
<body>

<h1>Welcome to My Application</h1>

<div class="container">
    <div class="box"><i class="fas fa-download"></i> Download</div> <!-- رمز تحميل -->
    <div class="box"><i class="fas fa-upload"></i> Upload</div> <!-- رمز رفع -->
    <div class="box"><i class="fas fa-cogs"></i> Settings</div> <!-- رمز إعدادات -->
    <div class="box"><i class="fas fa-search"></i> Search</div> <!-- رمز بحث -->
    <div class="box"><i class="fas fa-info-circle"></i> Info</div> <!-- رمز معلومات -->
    <div class="box"><i class="fas fa-envelope"></i> Messages</div> <!-- رمز رسائل -->
    <div class="box"><i class="fas fa-bell"></i> Notifications</div> <!-- رمز إشعارات -->
    <div class="box"><i class="fas fa-camera"></i> Camera</div> <!-- رمز كاميرا -->
    <div class="box"><i class="fas fa-play-circle"></i> Media</div> <!-- رمز وسائط -->
    <div class="box"><i class="fas fa-cloud-upload-alt"></i> Cloud Upload</div> <!-- رمز رفع سحابي -->
</div>

<!-- Login Form -->
<h2>Login</h2>
<input id="email" type="email" placeholder="Enter Email" required><br><br>
<input id="password" type="password" placeholder="Enter Password" required><br><br>
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
<button onclick="forgotPassword()">Forgot Password?</button> <!-- Forgot Password Button -->

<!-- Application after login -->
<div id="app">
    <h3>Welcome to the App!</h3>
    <button onclick="logout()">Logout</button>
    <h3>Pay with PayPal</h3>
    <div id="paypal-button-container"></div>
    <button onclick="generatePDF()">Download PDF</button> <!-- PDF Button -->
</div>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Register user
    function register() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        auth.createUserWithEmailAndPassword(email, password)
            .then(() => alert("Account created"))
            .catch(e => alert(e.message));
    }

    // Login user
    function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        auth.signInWithEmailAndPassword(email, password)
            .then(() => {
                document.getElementById("app").style.display = "block";
            })
            .catch(e => alert(e.message));
    }

    // Logout user
    function logout() {
        auth.signOut().then(() => {
            document.getElementById("app").style.display = "none";
        });
    }

    // Forgot Password functionality
    function forgotPassword() {
        const email = document.getElementById("email").value;
        if (email) {
            auth.sendPasswordResetEmail(email)
                .then(() => alert('Password reset email sent!'))
                .catch(e => alert(e.message));
        } else {
            alert('Please enter your email first.');
        }
    }

    // PayPal Button
    paypal.Buttons({
        createOrder: function (data, actions) {
            return actions.order.create({
                purchase_units: [{
                    amount: {
                        value: '10.00'
                    }
                }]
            });
        },
        onApprove: function (data, actions) {
            return actions.order.capture().then(function (details) {
                alert('Payment successful, ' + details.payer.name.given_name);
            });
        }
    }).render('#paypal-button-container');

    // Generate PDF
    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.text('Welcome to My Application!', 10, 10);
        doc.text('This is your PDF document.', 10, 20);
        doc.save('document.pdf');
    }
</script>

</body>
</html>
