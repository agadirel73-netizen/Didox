<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEX PRO TOOLS</title>

<script src="https://www.paypal.com/sdk/js?client-id=sb"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  text-align:center;
}

header{
  padding:15px;
  font-size:24px;
  font-weight:bold;
  color:#facc15;
}

#login{
  padding:20px;
}

input, textarea{
  width:80%;
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  width:80%;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.container{
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.box{
  background:white;
  color:black;
  padding:10px;
  border-radius:12px;
}

#premium{
  display:none;
  color:gold;
}
</style>

</head>

<body>

<header>⚡ NEX PRO TOOLS</header>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" class="container">

<div class="box">📝 Text<br>
<textarea id="text"></textarea>
<button onclick="text.value=text.value.toUpperCase()">UPPER</button>
<button onclick="text.value=text.value.toLowerCase()">lower</button>
</div>

<div class="box">🔢 Counter<br>
<textarea id="countText"></textarea>
<button onclick="res.innerText='Words: '+countText.value.split(' ').length">Count</button>
<p id="res"></p>
</div>

<div class="box">🔍 Search<br>
<input id="search">
<button onclick="window.open('https://google.com/search?q='+search.value)">Go</button>
</div>

<div class="box">📥 Download<br>
<textarea id="dl"></textarea>
<button onclick="download()">Download</button>
</div>

<div class="box">🖼️ Image<br>
<input type="file" onchange="img.src=URL.createObjectURL(event.target.files[0])">
<img id="img" width="100%">
</div>

<div class="box">📄 PDF<br>
<input type="file" id="pdfFile" accept="application/pdf">
<button onclick="openPDF()">Open PDF</button>
</div>

<div class="box">⚙️ Tool 7<br><button onclick="alert('OK')">Run</button></div>
<div class="box">⭐ Tool 8<br><button onclick="alert('OK')">Run</button></div>
<div class="box">🚀 Tool 9<br><button onclick="alert('OK')">Run</button></div>
<div class="box">💡 Tool 10<br><button onclick="alert('OK')">Run</button></div>

<div class="box" style="grid-column:span 2;">
💳 Premium
<div id="paypal-button"></div>
<div id="premium">💎 ACTIVE</div>
</div>

</div>

<script>

/* LOGIN */
function login(){
if(user.value && pass.value){
login.style.display="none";
app.style.display="grid";
}else{
alert("Fill all fields");
}
}

/* DOWNLOAD */
function download(){
let a=document.createElement("a");
a.href="data:text/plain,"+dl.value;
a.download="file.txt";
a.click();
}

/* PDF */
function openPDF(){
let file=document.getElementById("pdfFile").files[0];
if(file){
window.open(URL.createObjectURL(file));
}else alert("Select PDF");
}

/* PAYPAL */
paypal.Buttons({
  createOrder:function(data,actions){
    return actions.order.create({
      purchase_units:[{amount:{value:'5.00'}}]
    });
  },
  onApprove:function(){
    premium.style.display="block";
    alert("Premium Activated");
  }
}).render('#paypal-button');

</script>

</body>
</html>
