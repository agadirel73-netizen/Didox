<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Tools App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  text-align:center;
}

h1{
  margin:20px;
  color:#facc15;
  font-size:28px;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:20px;
}

/* TOOL BOX */
.tool{
  background:rgba(255,255,255,0.9);
  color:#111827;
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
  transition:0.3s;
  font-weight:bold;
}

.tool:hover{
  transform:scale(1.08);
  background:#e2e8f0;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#16a34a;
}
</style>

</head>

<body>

<h1>🔥 Ultimate Pro Tools App</h1>

<div class="container">

  <div class="tool">🤖 AI Tool<br><button onclick="alert('AI Ready')">Open</button></div>
  <div class="tool">🖼️ Image Tool<br><button onclick="alert('Image Tool')">Open</button></div>
  <div class="tool">📄 PDF Tool<br><button onclick="alert('PDF Tool')">Open</button></div>
  <div class="tool">📝 Text Tool<br><button onclick="alert('Text Tool')">Open</button></div>
  <div class="tool">✂️ Compress<br><button onclick="alert('Compress Tool')">Open</button></div>
  <div class="tool">🔍 Search<br><button onclick="alert('Search Tool')">Open</button></div>
  <div class="tool">📥 Download<br><button onclick="alert('Download Tool')">Open</button></div>
  <div class="tool">📤 Upload<br><button onclick="alert('Upload Tool')">Open</button></div>
  <div class="tool">⚙️ Settings<br><button onclick="alert('Settings')">Open</button></div>
  <div class="tool">⭐ Extra Tool<br><button onclick="alert('Extra Tool')">Open</button></div>

</div>

</body>
</html>
